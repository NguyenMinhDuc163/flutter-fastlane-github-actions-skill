name: Reusable Android Google Play

on:
  workflow_call:
    inputs:
      commit_sha:
        description: "Commit SHA that contains the bumped pubspec.yaml version"
        required: true
        type: string
      android_track:
        description: "Google Play track"
        required: false
        type: string
        default: internal
      android_release_status:
        description: "Google Play release status"
        required: false
        type: string
        default: completed
    secrets:
      GOOGLE_PLAY_SERVICE_ACCOUNT_JSON:
        required: true
      ANDROID_KEYSTORE_BASE64:
        required: true
      ANDROID_KEY_PROPERTIES_BASE64:
        required: true

jobs:
  build_google_play:
    name: Build and upload Google Play
    runs-on: ubuntu-24.04
    timeout-minutes: 45
    env:
      FASTLANE_SKIP_UPDATE_CHECK: "1"
      FASTLANE_HIDE_CHANGELOG: "1"
    steps:
      - name: Checkout bumped main
        uses: actions/checkout@v4
        with:
          ref: '${{ inputs.commit_sha }}'
          persist-credentials: false

      - name: Validate required secrets
        shell: bash
        env:
          GOOGLE_PLAY_SERVICE_ACCOUNT_JSON: '${{ secrets.GOOGLE_PLAY_SERVICE_ACCOUNT_JSON }}'
          ANDROID_KEYSTORE_BASE64: '${{ secrets.ANDROID_KEYSTORE_BASE64 }}'
          ANDROID_KEY_PROPERTIES_BASE64: '${{ secrets.ANDROID_KEY_PROPERTIES_BASE64 }}'
        run: |
          set -euo pipefail
          missing=0
          for name in \
            GOOGLE_PLAY_SERVICE_ACCOUNT_JSON \
            ANDROID_KEYSTORE_BASE64 \
            ANDROID_KEY_PROPERTIES_BASE64
          do
            if [ -z "${!name:-}" ]; then
              echo "::error::$name is not set"
              missing=1
            fi
          done

          if [ "$missing" -ne 0 ]; then
            exit 1
          fi

      - name: Write Android signing and Play credentials
        shell: bash
        env:
          GOOGLE_PLAY_SERVICE_ACCOUNT_JSON: '${{ secrets.GOOGLE_PLAY_SERVICE_ACCOUNT_JSON }}'
          ANDROID_KEYSTORE_BASE64: '${{ secrets.ANDROID_KEYSTORE_BASE64 }}'
          ANDROID_KEY_PROPERTIES_BASE64: '${{ secrets.ANDROID_KEY_PROPERTIES_BASE64 }}'
        run: |
          set -euo pipefail
          mkdir -p android/fastlane
          printf '%s' "$GOOGLE_PLAY_SERVICE_ACCOUNT_JSON" > android/fastlane/play-store-credentials.json

          python3 <<'PY'
          import base64
          import os
          from pathlib import Path

          key_properties_path = Path("android/key.properties")
          key_properties_path.write_bytes(base64.b64decode(os.environ["ANDROID_KEY_PROPERTIES_BASE64"]))
          key_properties_path.chmod(0o600)

          props = {}
          for raw_line in key_properties_path.read_text().splitlines():
              line = raw_line.strip()
              if not line or line.startswith("#") or "=" not in line:
                  continue
              key, value = line.split("=", 1)
              props[key.strip()] = value.strip()

          store_file = props.get("storeFile")
          if not store_file:
              raise SystemExit("android/key.properties must contain storeFile")

          keystore_path = Path(store_file)
          if not keystore_path.is_absolute():
              keystore_path = Path("android/app") / keystore_path

          keystore_path.parent.mkdir(parents=True, exist_ok=True)
          keystore_path.write_bytes(base64.b64decode(os.environ["ANDROID_KEYSTORE_BASE64"]))
          keystore_path.chmod(0o600)
          PY

          chmod 600 android/fastlane/play-store-credentials.json

      - name: Debug Android release inputs
        shell: bash
        run: |
          set -euo pipefail

          jq -e '
            type == "object"
            and has("client_email")
            and has("private_key")
            and has("token_uri")
          ' android/fastlane/play-store-credentials.json > /dev/null

          python3 <<'PY'
          from pathlib import Path
          import re

          props_path = Path("android/key.properties")
          props = {}
          for raw_line in props_path.read_text().splitlines():
              line = raw_line.strip()
              if not line or line.startswith("#") or "=" not in line:
                  continue
              key, value = line.split("=", 1)
              props[key.strip()] = value.strip()

          required = ["storeFile", "storePassword", "keyAlias", "keyPassword"]
          missing = [key for key in required if not props.get(key)]
          if missing:
              raise SystemExit(f"android/key.properties missing keys: {', '.join(missing)}")

          store_file = Path(props["storeFile"])
          keystore_path = store_file if store_file.is_absolute() else Path("android/app") / store_file
          if not keystore_path.is_file() or keystore_path.stat().st_size == 0:
              raise SystemExit(f"Android keystore was not written at {keystore_path}")

          gradle_text = Path("android/app/build.gradle.kts").read_text()
          app_id_match = re.search(r'applicationId\s*=\s*"([^"]+)"', gradle_text)
          if not app_id_match:
              raise SystemExit("Could not find Android applicationId in android/app/build.gradle.kts")

          appfile_text = Path("android/fastlane/Appfile").read_text()
          package_match = re.search(r'package_name\("([^"]+)"\)', appfile_text)
          if not package_match:
              raise SystemExit("Could not find package_name in android/fastlane/Appfile")

          application_id = app_id_match.group(1)
          package_name = package_match.group(1)
          if application_id != package_name:
              raise SystemExit(
                  f"Android applicationId ({application_id}) does not match Fastlane package_name ({package_name})"
              )

          print(f"Android applicationId: {application_id}")
          print(f"Android key.properties keys present: {', '.join(required)}")
          print(f"Android keystore path: {keystore_path}")
          print(f"Android keystore bytes: {keystore_path.stat().st_size}")
          PY

          echo "Google Play JSON: valid JSON with required top-level keys"

      - name: Read Flutter version
        id: flutter_version
        shell: bash
        run: |
          set -euo pipefail
          echo "version=$(jq -r '.flutter' .fvmrc)" >> "$GITHUB_OUTPUT"

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: gradle

      - name: Cache Android SDK packages
        uses: actions/cache@v4
        with:
          path: |
            /usr/local/lib/android/sdk/ndk/27.0.12077973
            /usr/local/lib/android/sdk/platforms/android-35
          key: ${{ runner.os }}-android-sdk-ndk-27.0.12077973-platform-35-v1

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '${{ steps.flutter_version.outputs.version }}'
          cache: true

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "4.0"
          bundler-cache: true
          working-directory: android

      - name: Upload to Google Play
        working-directory: android
        shell: bash
        run: bundle exec fastlane android deploy track:${{ inputs.android_track }} release_status:${{ inputs.android_release_status }}

      - name: Upload AAB artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: android-aab
          path: build/app/outputs/bundle/release/*.aab
          if-no-files-found: ignore

      - name: Upload Android symbol artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: symbol
          path: build/app/intermediates/merged_native_libs/release/mergeReleaseNativeLibs/out/lib
          if-no-files-found: warn
