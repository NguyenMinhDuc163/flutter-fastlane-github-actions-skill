name: Mobile Store Release

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      run_ios:
        description: "Build and upload iOS TestFlight"
        type: boolean
        default: false
      run_android:
        description: "Build and upload Android Google Play"
        type: boolean
        default: true
      android_track:
        description: "Google Play track"
        type: choice
        default: internal
        options:
          - internal
          - alpha
          - beta
          - production
      android_release_status:
        description: "Google Play release status"
        type: choice
        default: completed
        options:
          - draft
          - completed

env:
  # Flip these defaults in this root workflow when you want push-to-main
  # releases to build only one platform.
  # RUN_IOS/RUN_ANDROID: "true" to build, "false" to skip.
  RUN_IOS: "true"
  RUN_ANDROID: "true"
  # ANDROID_TRACK: internal, alpha, beta, production.
  ANDROID_TRACK: "internal"
  # ANDROID_RELEASE_STATUS: draft, completed.
  ANDROID_RELEASE_STATUS: "completed"

concurrency:
  group: mobile-store-release-main
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  release_config:
    name: Resolve release config
    if: ${{ !contains(github.event.head_commit.message || '', '[skip ci]') }}
    runs-on: ubuntu-24.04
    outputs:
      run_ios: ${{ steps.config.outputs.run_ios }}
      run_android: ${{ steps.config.outputs.run_android }}
      android_track: ${{ steps.config.outputs.android_track }}
      android_release_status: ${{ steps.config.outputs.android_release_status }}
    steps:
      - name: Resolve platform toggles
        id: config
        shell: bash
        env:
          WORKFLOW_INPUT_RUN_IOS: ${{ inputs.run_ios }}
          WORKFLOW_INPUT_RUN_ANDROID: ${{ inputs.run_android }}
          WORKFLOW_INPUT_ANDROID_TRACK: ${{ inputs.android_track }}
          WORKFLOW_INPUT_ANDROID_RELEASE_STATUS: ${{ inputs.android_release_status }}
        run: |
          set -euo pipefail

          normalize_bool() {
            case "${1,,}" in
              true|1|yes|y) printf 'true' ;;
              false|0|no|n|'') printf 'false' ;;
              *) echo "::error::Invalid boolean value: $1"; exit 1 ;;
            esac
          }

          run_ios="$RUN_IOS"
          run_android="$RUN_ANDROID"
          android_track="$ANDROID_TRACK"
          android_release_status="$ANDROID_RELEASE_STATUS"

          if [ "$GITHUB_EVENT_NAME" = "workflow_dispatch" ]; then
            run_ios="${WORKFLOW_INPUT_RUN_IOS:-$run_ios}"
            run_android="${WORKFLOW_INPUT_RUN_ANDROID:-$run_android}"
            android_track="${WORKFLOW_INPUT_ANDROID_TRACK:-$android_track}"
            android_release_status="${WORKFLOW_INPUT_ANDROID_RELEASE_STATUS:-$android_release_status}"
          fi

          run_ios="$(normalize_bool "$run_ios")"
          run_android="$(normalize_bool "$run_android")"

          {
            echo "run_ios=$run_ios"
            echo "run_android=$run_android"
            echo "android_track=$android_track"
            echo "android_release_status=$android_release_status"
          } >> "$GITHUB_OUTPUT"

          echo "Resolved release config: ios=$run_ios android=$run_android android_track=$android_track android_release_status=$android_release_status"

  bump_version:
    name: Bump pubspec build number
    needs: release_config
    if: ${{ !contains(github.event.head_commit.message || '', '[skip ci]') && (needs.release_config.outputs.run_ios == 'true' || needs.release_config.outputs.run_android == 'true') }}
    runs-on: ubuntu-24.04
    permissions:
      contents: write
    outputs:
      version: ${{ steps.bump.outputs.version }}
      build_number: ${{ steps.bump.outputs.build_number }}
      commit_sha: ${{ steps.commit.outputs.commit_sha }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Increment build number
        id: bump
        shell: bash
        run: |
          set -euo pipefail
          python3 <<'PY'
          from pathlib import Path
          import re
          import os

          path = Path("pubspec.yaml")
          text = path.read_text()
          pattern = re.compile(r"^version:\s*([0-9]+(?:\.[0-9]+){2})\+([0-9]+)\s*$", re.MULTILINE)
          match = pattern.search(text)
          if not match:
            raise SystemExit("pubspec.yaml must contain version: x.y.z+n")

          version_name = match.group(1)
          build_number = int(match.group(2)) + 1
          new_line = f"version: {version_name}+{build_number}"
          text = pattern.sub(new_line, text, count=1)
          path.write_text(text)

          with open(os.environ["GITHUB_OUTPUT"], "a") as output:
            output.write(f"version={version_name}\n")
            output.write(f"build_number={build_number}\n")
          PY

      - name: Commit version bump
        id: commit
        shell: bash
        run: |
          set -euo pipefail
          if git diff --quiet -- pubspec.yaml; then
            echo "No pubspec.yaml version change."
            echo "commit_sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add pubspec.yaml
          git commit -m "ci: bump mobile build to ${{ steps.bump.outputs.version }}+${{ steps.bump.outputs.build_number }} [skip ci]"
          git push
          echo "commit_sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"

  build_testflight:
    name: Build and upload TestFlight
    needs:
      - release_config
      - bump_version
    if: ${{ !contains(github.event.head_commit.message || '', '[skip ci]') && needs.release_config.outputs.run_ios == 'true' }}
    permissions:
      contents: read
    uses: ./.github/workflows/reusable-ios-testflight.yml
    with:
      commit_sha: ${{ needs.bump_version.outputs.commit_sha }}
    secrets: inherit

  build_google_play:
    name: Build and upload Google Play
    needs:
      - release_config
      - bump_version
    if: ${{ !contains(github.event.head_commit.message || '', '[skip ci]') && needs.release_config.outputs.run_android == 'true' }}
    permissions:
      contents: read
    uses: ./.github/workflows/reusable-android-google-play.yml
    with:
      commit_sha: ${{ needs.bump_version.outputs.commit_sha }}
      android_track: ${{ needs.release_config.outputs.android_track }}
      android_release_status: ${{ needs.release_config.outputs.android_release_status }}
    secrets: inherit
